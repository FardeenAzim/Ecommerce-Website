<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        header {
            background-color:  #F5F5F7; /* Initially transparent */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            height: 10vh;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: bold;
            color: #111; /* Default text color */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 0 0 8px 8px;
            transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
            z-index: 1000; /* Ensures it's always above other elements */
        }
    
        /* Left and Center alignment */
        header .left {
            position: absolute;
            left: 20px;
        }
    
        header .center {
            margin: 0 auto;
        }
    
        /* Change background and text color when scrolled */
        header.scrolled {
            background-color: black !important; /* Black background on scroll */
            color: white !important; /* White text on scroll */
        }
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            justify-content: center;
            align-items: center;
            height: 80vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30vh;
            margin-left: 35vw;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            justify-content: center;
            align-items: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #333;
        }
        p {
            font-size: 18px;
            color: #555;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        #pay-button {
            background-color: #3399cc;
            color: white;
            font-size: 18px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s ease-in-out;
        }
        #pay-button:hover {
            background-color: #287bb5;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo d-flex align-items-center">
            {% comment %} <img src="static/assets/img/logo/mainlogo.jpg" alt="Shopille">  {% endcomment %}
           <h1 class="logo" href="/">Shopille</h1>
         </a>
        <span class="center">Razorpay Payment Page</span>
    </header>
    <div class="container">
        <h2>Complete Your Payment</h2>

        {% if error %}
            <p class="error">Error: {{ error }}</p>
        {% else %}
            <p><strong>Order ID:</strong> {{ razorpay_order_id }}</p>
            <p><strong>Amount:</strong> ₹{{ amount }}0</p>

            <button id="pay-button">Pay with Razorpay</button>

            <script>
                var options = {
                    "key": "{{ razorpay_key }}", 
                    "amount": "{{ amount }}" * 100,  // Convert to paise
                    "currency": "{{ currency }}",
                    "name": "Shopille",
                    "description": "Purchase Payment",
                    "order_id": "{{ razorpay_order_id }}",
                    "handler": function (response) {
                        let successUrl = `/payment_success/?payment_id=${response.razorpay_payment_id}&order_id={{ razorpay_order_id }}&signature=${response.razorpay_signature}`;
                
                        {% if single_product %}
                            successUrl += `&product_id={{ product_id }}&quantity={{ quantity }}`;
                        {% endif %}
                
                        window.location.href = successUrl;
                    },  // ✅ **Comma added here** (This was missing)
                
                    "theme": {
                        "color": "#3399cc"
                    }
                };
                
                var rzp1 = new Razorpay(options);
                document.getElementById('pay-button').onclick = function(e){
                    rzp1.open();
                    e.preventDefault();
                };
                
            </script>
        {% endif %}
    </div>
</body>
</html>
