<h2>Order History</h2>
{% for order in orders %}
    <div>
        <p>Order ID: {{ order.id }}</p>
        <p>Items: {{ order.items }}</p>
        <p>Total Amount: {{ order.total_amount }}</p>
        <p>Status: {{ order.status }}</p>
        <p>Date: {{ order.created_at }}</p>
    </div>
{% empty %}
    <p>No orders found.</p>
{% endfor %}
