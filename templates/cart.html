{% comment %} {% extends 'base.html' %} {% endcomment %}

{% block title %}
<title>Your Cart</title>
{% endblock title %}

{% block body %}

<style>
    /* Custom styles for the cart page */
    .cart-page {
        display: flex;
        justify-content: space-between;
        margin: 20px;
    }
    .cart-section {
        flex: 1;
        margin-right: 20px;
    }
    .price-details {
        flex-basis: 300px;
        border: 1px solid #ddd;
        padding: 20px;
        background-color: #fff;
    }

    header {
        display: flex;
        justify-content: space-between;
        text-align: left;
        padding: 20px;
        background-color: #7d298f;
        color: white;
        font-size: 24px;
    }

    .cart-item-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #f8f8f8;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        flex-wrap: wrap; /* Allow items to wrap if necessary */
    }
    .cart-item {
        display: flex;
        align-items: center;
        width: 100%;
    }
    .item-details {
        flex: 2;
        margin-left: 20px;
    }
    .quantity-section {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
        justify-content: center;
        margin-left: 280px; /* Ensure spacing from quantity section */
    }
    .remove-item-btn {
        background-color: #f44336;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 5px;
        flex-basis: 100px; /* Fixed width for remove button */
        margin-left: 440px; /* Ensure spacing from quantity section */
    }
    .remove-item-btn:hover {
        background-color: #d32f2f;
    }
    .price-summary {
        margin-bottom: 20px;
    }
    .buy-now-btn,
    .clear-cart-btn {
        background-color: #4caf50;
        color: white;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
        margin-right: 10px;
    }
    .clear-cart-btn {
        background-color: #f44336;
    }
</style>

<header>
    <div>Shopille</div>
    <div class="header-right">
        <span>Hello, {{ user.username }}</span>
    </div>
</header>

<div class="cart-page">

    <div class="cart-section">
        <h1>Your Cart</h1>
        <div class="container" id="cart-items">
            <!-- Cart items will be dynamically injected here using JavaScript -->
        </div>
    </div>

    <!-- PRICE DETAILS SECTION -->
    <div class="price-details">
        <h3>PRICE DETAILS</h3>
        <div class="price-summary">
            <p>Price (<span id="item-count">0</span> items): ₹<span id="item-price">0</span></p>
            <p>Total Amount: ₹<span id="total-amount">0</span></p>
        </div>
        <button class="buy-now-btn p-2 m-4" id="buy-now-btn" style="border-radius: 15px;">BUY NOW</button>
        <button class="clear-cart-btn p-2 m-4" id="clear-cart-btn" style="border-radius: 15px;">CLEAR CART</button>
    </div>
</div>

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        // Function to increase the quantity of an item in the cart
     window.increaseQuantity = function (productId) {
    const item = cart.find(item => item.id === productId);
    if (item) {
        item.quantity += 1;  // Increase the quantity by 1
        updateCartDisplay();  // Update the UI with the new cart data

        // Send updated cart data to the backend (save it in session)
        fetch("/update-cart-session/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCookie("csrftoken"),
            },
            body: JSON.stringify({
                product_id: productId,
                action: "increase",  // Indicating we want to increase the quantity
            }),
        })
        .then(response => response.json())
        .then(data => {
            if (!data.success) {
                alert(data.error || "Error updating cart.");
            }
        })
        .catch(error => console.error("Error:", error));
    }
  };

    // Function to decrease the quantity of an item in the cart
    window.decreaseQuantity = function (productId) {
        const item = cart.find(item => item.id === productId);
        if (item && item.quantity > 1) {
        item.quantity -= 1;  // Decrease the quantity by 1
        updateCartDisplay();  // Update the UI with the new cart data

        // Send updated cart data to the backend (save it in session)
        fetch("/update-cart-session/", {
            method: "POST",
            headers: {

        })

        .then(data => {

            }
        })
        .catch(error => console.error("Error:", error));
    }
};
