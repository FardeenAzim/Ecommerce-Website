<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin: auto;
        }
        .order {
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
        }
        .order:last-child {
            border-bottom: none;
        }
        .order h3 {
            margin: 0;
            color: #0073e6;
        }
        .order-date, .order-status {
            font-size: 14px;
            color: #555;
        }
        .order-items {
            margin-top: 10px;
        }
        .order-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .order-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            margin-right: 10px;
        }
        .order-item-details {
            font-size: 14px;
        }
        .total-amount {
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }
        .view-order {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #0073e6;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>My Orders</h2>
        <div id="orders-container">
            <p>Loading orders...</p>
        </div>
    </div>

    <script>
        window.onload = function () {
            fetch("/get_orders/")
                .then(response => response.json())
                .then(data => {
                    const ordersContainer = document.getElementById("orders-container");
                    
                    if (data.orders.length === 0) {
                        ordersContainer.innerHTML = "<p>No orders found.</p>";
                        return;
                    }

                    ordersContainer.innerHTML = data.orders.map(order => `
                        <div class="order">
                            <h3>Order #${order.order_id}</h3>
                            <p class="order-date">📅 Placed on: ${order.order_date}</p>
                            <p class="order-status">🚀 Status: ${order.status}</p>
                            
                            <div class="order-items">
                                ${order.items.map(item => `
                                    <div class="order-item">
                                        <img src="${item.image_url}" alt="${item.product_name}">
                                        <div class="order-item-details">
                                            <p><strong>${item.product_name}</strong></p>
                                            <p>Quantity: ${item.quantity}</p>
                                            <p>Price: ₹${item.price}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <p class="total-amount">Total: ₹${order.total_amount}</p>
                            <a href="/order_details/${order.order_id}" class="view-order">View Order</a>
                        </div>
                    `).join('');
                })
                .catch(error => {
                    console.error("Error fetching orders:", error);
                    document.getElementById("orders-container").innerHTML = "<p>Error loading orders.</p>";
                });
        };
    </script>

</body>
</html>
